<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.png" type="image/png">
    <title>G.I 道具：風險骰子 - 完整實體化</title>
    
    <style>
        body { background-color: #0d0d0d; color: white; text-align: center; font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        
        #total-box { margin-bottom: 20px; }
        .label { color: #444; letter-spacing: 5px; font-size: 14px; margin-bottom: 5px; }
        #global-counter { font-size: 80px; font-weight: 900; color: #ff0000; text-shadow: 0 0 40px #600; line-height: 0.8; }

        /* 獵人名稱輸入 */
        #user-config { margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        #user-name { background: #1a1a1a; border: 1px solid #444; color: #ffd700; padding: 10px; border-radius: 5px; text-align: center; width: 200px; font-size: 16px; transition: 0.3s; }
        #user-name:focus { border-color: #ffd700; outline: none; }

        /* 隱藏的管理員面板 */
        #admin-panel { display: none; background: #200; border: 1px solid #f00; padding: 15px; border-radius: 10px; margin-bottom: 20px; animation: fadeIn 0.3s; }
        .admin-btn { background: #400; color: #f66; border: 1px solid #600; padding: 5px 10px; cursor: pointer; margin: 5px; font-size: 12px; }

        #dice-box { width: 180px; height: 180px; background: #1a1a1a; border: 6px solid #ffd700; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 50px; font-weight: bold; margin-bottom: 30px; box-shadow: inset 0 0 30px #000, 0 0 20px rgba(255,215,0,0.2); transition: 0.1s; position: relative; }
        .text-ji { color: #ffd700; text-shadow: 0 0 20px #ffd700; }
        .text-xiong { color: #ff0000; text-shadow: 0 0 25px #ff0000; font-size: 60px; }
        
        #use-btn { padding: 15px 30px; font-size: 20px; cursor: pointer; background: linear-gradient(135deg, #ffd700, #b8860b); color: #000; border: none; border-radius: 10px; font-weight: 900; transition: 0.3s; box-shadow: 0 8px 0 #5e4a00; margin-bottom: 40px; }
        #use-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #5e4a00; }
        #use-btn:disabled { background: #333; color: #666; box-shadow: none; transform: translateY(8px); }

        /* 受難者名冊 */
        #history-box { width: 100%; max-width: 500px; background: #111; border: 1px solid #222; border-radius: 10px; padding: 15px; text-align: left; }
        #history-box h3 { font-size: 14px; color: #666; border-bottom: 1px solid #222; padding-bottom: 10px; margin-top: 0; }
        #log-list { list-style: none; padding: 0; margin: 0; font-size: 13px; color: #888; max-height: 200px; overflow-y: auto; }
        .log-item { padding: 8px 0; border-bottom: 1px solid #1a1a1a; animation: fadeIn 0.5s; }
        .log-name { color: #ffd700; font-weight: bold; }
        .log-doom { color: #ff4444; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .glitch-red { animation: glitch-anim 0.1s infinite; border-color: #ff0000 !important; }
        @keyframes glitch-anim { 0% { transform: scale(1.1) translate(2px, -2px); } 50% { transform: scale(1.05) translate(-2px, 2px); } 100% { transform: scale(1.1) } }
        .shake-all { animation: shake-screen 0.05s infinite; }
        @keyframes shake-screen { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(0px, 4px); } }
    </style>
</head>
<body>

    <audio id="snd-roll" src="roll.mp3"></audio>
    <audio id="snd-lucky" src="lucky.mp3"></audio>
    <audio id="snd-glitch" src="glitch.mp3"></audio>
    <audio id="snd-bad" src="bad.mp3"></audio>

    <div id="total-box">
        <p class="label">累積「厄運」值</p>
        <div id="global-counter">--</div>
    </div>

    <div id="user-config">
        <span class="label" style="font-size: 12px;">獵人代號</span>
        <input type="text" id="user-name" placeholder="不知名的獵人" maxlength="10">
    </div>

    <div id="admin-panel">
        <div class="label" style="color: #f66; font-size: 12px;">GM 權限已解鎖</div>
        <button class="admin-btn" onclick="setForceBad()">鎖定下一手：大凶</button>
        <button class="admin-btn" onclick="clearLogs()">清除受難紀錄</button>
    </div>

    <div id="dice-box">?</div>
    <button id="use-btn" onclick="useDice()" disabled>連線中...</button>

    <div id="history-box">
        <h3>受難者名冊</h3>
        <ul id="log-list"><li class="log-item">載入中...</li></ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction, push, set, serverTimestamp, query, limitToLast, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAZBQWLAYJsgq4CltF2LTXflukLv6DLAiA",
          authDomain: "gi-risky-dice.firebaseapp.com",
          projectId: "gi-risky-dice",
          storageBucket: "gi-risky-dice.firebasestorage.app",
          messagingSenderId: "464525134732",
          appId: "1:464525134732:web:948f470342ddca6415e4a9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const doomRef = ref(db, 'doomCount');
        const logRef = ref(db, 'logs');
        const gmRef = ref(db, 'gmControl');

        // Cookie 讀取與寫入
        const nameInput = document.getElementById('user-name');
        const getCookie = (n) => document.cookie.match('(^|;)\\s*' + n + '\\s*=\\s*([^;]+)')?.pop();
        const savedName = getCookie('hunterName');
        if (savedName) nameInput.value = decodeURIComponent(savedName);

        nameInput.addEventListener('input', (e) => {
            const val = e.target.value;
            // 管理員暗號檢查 (Base64 混淆: GM666 的編碼是 R002NjY=)
            if (btoa(val) === "R002NjY=") {
                document.getElementById('admin-panel').style.display = 'block';
                e.target.value = "";
            }
            document.cookie = `hunterName=${encodeURIComponent(val)}; max-age=31536000; path=/`;
        });

        // GM 功能
        window.setForceBad = () => set(gmRef, { forceBad: true });
        window.clearLogs = () => { if(confirm("確定清除名冊？")) remove(logRef); };

        // 監聽雲端數值
        onValue(doomRef, (snapshot) => {
            window.currentDoom = snapshot.val() || 0;
            document.getElementById('global-counter').innerText = window.currentDoom;
            document.getElementById('use-btn').disabled = false;
            document.getElementById('use-btn').innerText = '使用「風險骰子」';
        });

        onValue(gmRef, (snapshot) => { window.nextIsBad = snapshot.val()?.forceBad || false; });

        // 受難者名冊更新
        onValue(query(logRef, limitToLast(10)), (snapshot) => {
            const list = document.getElementById('log-list');
            list.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.values(data).reverse().forEach(log => {
                    const date = new Date(log.time);
                    const t = `${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
                    const li = document.createElement('li');
                    li.className = 'log-item';
                    li.innerHTML = `<span class="log-name">${log.name}</span> 在 ${t} 承受了 <span class="log-doom">${log.doom}</span> 份大吉份的厄運`;
                    list.appendChild(li);
                });
            } else { list.innerHTML = '<li class="log-item">名冊空白</li>'; }
        });

        window.updateCloud = function(type, name, doom) {
            if (type === 'add') runTransaction(doomRef, (v) => (v || 0) + 1);
            else if (type === 'reset') {
                set(doomRef, 0);
                set(gmRef, { forceBad: false });
                push(logRef, { name: name || "不知名的獵人", doom: doom, time: serverTimestamp() });
            }
        };
    </script>

    <script>
        let isRolling = false;
        const diceBox = document.getElementById('dice-box');
        const btn = document.getElementById('use-btn');
        const nameInput = document.getElementById('user-name');

        function playSnd(id) {
            const el = document.getElementById(id);
            if(el) { el.currentTime = 0; el.play().catch(e => {}); }
        }

        function useDice() {
            if (isRolling) return;
            isRolling = true;
            btn.disabled = true;
            
            document.body.classList.remove('shake-all');
            document.body.style.backgroundColor = "#0d0d0d";
            diceBox.classList.remove('glitch-red');
            diceBox.style.borderColor = "#ffd700";
            
            playSnd('snd-roll');

            let rollInterval = setInterval(() => {
                const isRed = Math.random() < 0.2;
                diceBox.innerHTML = isRed ? '<span class="text-xiong" style="font-size:36px; opacity:0.3;">大凶</span>' : '<span class="text-ji" style="font-size:36px; opacity:0.3;">大吉</span>';
            }, 60);

            setTimeout(() => {
                clearInterval(rollInterval);
                const isTotalBad = window.nextIsBad || (Math.floor(Math.random() * 20) === 0);
                let finalResult = isTotalBad ? (Math.random() < 0.6 ? "directBad" : "reverseBad") : "lucky";

                if (finalResult === "directBad") {
                    triggerBadEnd();
                } else {
                    diceBox.innerHTML = '<span class="text-ji">大吉</span>';
                    if (finalResult === "reverseBad") {
                        setTimeout(() => {
                            playSnd('snd-glitch');
                            diceBox.classList.add('glitch-red'); 
                            setTimeout(() => triggerBadEnd(), 800); 
                        }, 600); 
                    } else {
                        playSnd('snd-lucky');
                        window.updateCloud('add');
                        isRolling = false;
                        btn.disabled = false;
                    }
                }
            }, 1500);
        }

        function triggerBadEnd() {
            const finalDoom = window.currentDoom;
            const hunterName = nameInput.value.trim() || "不知名的獵人";
            window.updateCloud('reset', hunterName, finalDoom);
            
            playSnd('snd-bad');
            diceBox.innerHTML = '<span class="text-xiong">大凶</span>';
            diceBox.style.borderColor = "#ff0000";
            document.body.classList.add('shake-all');
            document.body.style.backgroundColor = "#000";

            // 5 秒後自動停止震動並恢復背景
            setTimeout(() => {
                document.body.classList.remove('shake-all');
                document.body.style.backgroundColor = "#0d0d0d";
            }, 5000);

            setTimeout(() => {
                alert(`☠️ 命運終結！\n${hunterName} 領取了 ${finalDoom} 份厄運。`);
                isRolling = false;
                btn.disabled = false;
            }, 600);
        }
    </script>
</body>
</html>
